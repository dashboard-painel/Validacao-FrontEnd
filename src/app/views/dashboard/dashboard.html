<section data-testid="page-dashboard" aria-labelledby="heading-dashboard">
  <h1 id="heading-dashboard" data-testid="heading-dashboard" class="visually-hidden">Dashboard</h1>

  @if (isLoading()) {
    <div class="d-flex justify-content-center align-items-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Carregando...</span>
      </div>
    </div>
  } @else {
    <!-- ── Filtro Global ──────────────────────────────────────────── -->
    <app-global-filter-bar
      [selectedGlobalFilters]="selectedGlobalFilters()"
      [globalFilterSearch]="globalFilterSearch()"
      [openGlobalFilter]="openGlobalFilter()"
      [associationOptions]="globalAssociationOptions()"
      (filterChange)="onGlobalFilterChange($event)"
      (searchChange)="onGlobalSearchChange($event)"
      (toggleDropdown)="onGlobalDropdownToggle($event)"
      (chipRemove)="onGlobalChipRemove($event)"
      (clearAll)="clearGlobalFilters()"
    ></app-global-filter-bar>

    <div class="row g-4">
      <section id="secao-kpis" class="col-12" aria-label="Indicadores de CNPJ">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-xl-4 g-3">
          <div class="col">
            <app-kpi
              title="Total de Lojas"
              [value]="dashboardData().kpis.totalStores"
              [previousValue]="dashboardData().previousKpis.totalStores"
            ></app-kpi>
          </div>
          <div class="col">
            <app-kpi
              title="Quantidade de Lojas OK"
              [value]="dashboardData().kpis.okStores"
              tone="success"
              badge="OK"
              [previousValue]="dashboardData().previousKpis.okStores"
            ></app-kpi>
          </div>
          <div class="col">
            <app-kpi
              title="Quantidade de Lojas com Atraso"
              [value]="dashboardData().kpis.divergentStores"
              tone="danger"
              badge="Alerta"
              [previousValue]="dashboardData().previousKpis.divergentStores"
              [invertTrend]="true"
            ></app-kpi>
          </div>
          <div class="col">
            <app-kpi
              title="Quantidade de Lojas Sem Dados"
              [value]="dashboardData().kpis.storesWithoutData"
              tone="nodata"
              [previousValue]="dashboardData().previousKpis.storesWithoutData"
              [invertTrend]="true"
              badge="Sem dados"
            ></app-kpi>
          </div>
        </div>
      </section>

      <section id="secao-indicador" class="col-12" aria-label="Indicador de lojas">
        <article class="card status-chart-card" role="group" aria-label="Indicador de lojas">
          <div class="card-body">
            <div class="row g-3 align-items-stretch">
              <div class="col-12 col-sm-5 col-xl-3 d-flex">
                <app-gauge
                  class="d-block w-100"
                  [embedded]="true"
                  [totalStores]="dashboardData().gauge.totalStores"
                  [okStores]="dashboardData().statuses.ok"
                ></app-gauge>
              </div>

              <div class="col-12 col-sm-7 col-xl-9 status-chart__right-col">
                <app-status-bar [items]="statusBarItems()"></app-status-bar>
              </div>
            </div>
          </div>
        </article>
      </section>

      <section id="secao-lojas-monitoradas" class="col-12" aria-labelledby="heading-lojas-monitoradas">
        <article class="card delayed-stores-card">
          <div class="card-body">
            <div class="d-flex align-items-center justify-content-between gap-2 mb-3">
              <p id="heading-lojas-monitoradas" class="delayed-stores__title mb-0">Lojas monitoradas</p>
              <div class="d-flex align-items-center gap-2">
                <span class="delayed-stores__count"
                  >{{ filteredDelayedStoreCount() }} de {{ delayedStoreRows().length }} lojas</span
                >
                <span id="compare-hint" class="visually-hidden">{{ compareButtonTitle() }}</span>
                <button
                  type="button"
                  class="btn btn-sm btn-primary"
                  [disabled]="!comparableAssociation() || isComparing()"
                  (click)="onComparar()"
                  [title]="compareButtonTitle()"
                  aria-describedby="compare-hint"
                >
                  @if (isComparing()) {
                    <span
                      class="spinner-border spinner-border-sm me-1"
                      role="status"
                      aria-hidden="true"
                    ></span>
                    Comparando...
                  } @else {
                    <i class="bi bi-arrow-clockwise me-1"></i>
                    Atualizar
                  }
                </button>
              </div>
            </div>
            @if (compareError()) {
              <div class="alert alert-danger alert-sm py-1 px-2 mb-2" role="alert">
                <i class="bi bi-exclamation-triangle me-1"></i>{{ compareError() }}
              </div>
            }

            <app-delayed-stores-table
              [rows]="delayedStoreRows()"
              [visibleRows]="visibleDelayedStoreRows()"
              [totalCount]="delayedStoreRows().length"
              [filteredCount]="filteredDelayedStoreCount()"
              [hasMoreRows]="hasMoreRows()"
              [hasActiveFilters]="hasActiveFilters()"
              [filtersOpen]="filtersOpen()"
              [activePreset]="activePreset()"
              [selectedMultiFilters]="selectedMultiFilters()"
              [multiFilterSearch]="multiFilterSearch()"
              [openMultiFilter]="openMultiFilter()"
              [pharmacyNameFilter]="pharmacyNameFilter()"
              [selectedProblemLayers]="selectedProblemLayers()"
              [selectedStoreStatuses]="selectedStoreStatuses()"
              [selectedSitContratosLocal]="selectedSitContratosLocal()"
              [possivelCausaFilter]="possivelCausaFilter()"
              [minDelayHoursFilter]="minDelayHoursFilter()"
              [sortColumn]="sortColumn()"
              [sortDir]="sortDir()"
              [associationCodeOptions]="associationCodeOptions()"
              [farmaCodeOptions]="farmaCodeOptions()"
              [cnpjOptions]="cnpjOptions()"
              [sitContratoOptions]="sitContratoOptions()"
              [delayedLayerOptions]="delayedLayerOptions"
              [storeStatusOptions]="storeStatusOptions"
              (multiCheckboxChange)="onMultiCheckboxChange($event)"
              (pharmacyNameChange)="onPharmacyNameChange($event)"
              (multiFilterSearchChange)="onMultiSearchChange($event)"
              (problemLayerChange)="onProblemLayerChange($event)"
              (storeStatusChange)="onStoreStatusChange($event)"
              (sitContratoLocalChange)="onSitContratoLocalChange($event)"
              (possivelCausaChange)="onPossivelCausaChange($event)"
              (minDelayChange)="onMinDelayChange($event)"
              (multiFilterToggle)="onMultiFilterToggleChange($event)"
              (storeSelect)="openStoreModal($event)"
              (tableScroll)="onTableScroll()"
              (clearFilters)="clearFilters()"
              (sortChange)="onSortChange($event)"
              (presetChange)="onPresetChange($event)"
              (filtersToggle)="onFiltersToggle()"
            ></app-delayed-stores-table>
          </div>
        </article>
      </section>
    </div>
  }

  <app-store-detail-modal
    [store]="selectedStore()"
    (closed)="closeStoreModal()"
  ></app-store-detail-modal>
</section>
