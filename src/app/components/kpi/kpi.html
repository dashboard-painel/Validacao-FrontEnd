<article
  class="card kpi-card h-100"
  [class.kpi-card--neutral]="tone() === 'neutral'"
  [class.kpi-card--success]="tone() === 'success'"
  [class.kpi-card--warning]="tone() === 'warning'"
  [class.kpi-card--danger]="tone() === 'danger'"
  [class.kpi-card--nodata]="tone() === 'nodata'"
  role="group"
  [attr.aria-label]="title()"
>
  <div class="card-body d-flex flex-column justify-content-between gap-2">
    <div class="d-flex align-items-start justify-content-between gap-2">
      <p class="kpi-card__label mb-0">{{ title() }}</p>
      @if (badgeLabel()) {
        <span class="kpi-card__chip">{{ badgeLabel() }}</span>
      }
    </div>
    <div class="d-flex align-items-end gap-2">
      <p class="kpi-card__value mb-0">{{ value() }}</p>
      @if (trend()) {
        <span
          class="kpi-card__trend"
          [class.kpi-card__trend--green]="trendColor() === 'green'"
          [class.kpi-card__trend--red]="trendColor() === 'red'"
          [attr.aria-label]="trend() === 'up' ? 'Aumento' : 'Redução'"
        >
          @if (trend() === 'up') {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                d="M4 18l8-8 8 8"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                fill="none"
              />
            </svg>
          } @else {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                d="M4 6l8 8 8-8"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                fill="none"
              />
            </svg>
          }
        </span>
      }
    </div>
  </div>
</article>
